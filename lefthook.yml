pre-commit:
  parallel: false
  commands:
    format:
      run: git diff --staged --name-only --diff-filter=ACM | grep -E '\.(ts|tsx|js|jsx|json|md)$' | xargs -r deno fmt && git diff --staged --name-only | xargs -r git add
    lint:
      run: deno task lint
      glob: '*.{ts,tsx,js,jsx}'
    test:
      run: deno task test
