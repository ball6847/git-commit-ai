# Sprint Goal
goal: 'Replace hardcoded provider list with models.dev-driven dynamic provider resolution, so the CLI automatically supports all providers as models.dev grows — without code changes when new providers are added.'

# Sprint Plan Reference
sprint_plan: 'docs/stories/sprint-1-plan.md'

# Key Design Decisions
key_decisions:
  - "Additive approach — models.dev integration adds on top of existing providers, doesn't replace them"
  - 'Cache-first — Aggressive caching (24h) minimizes API calls to models.dev'
  - 'Env var discovery — Providers auto-activate when their API key env var is set'
  - '@ai-sdk/openai-compatible fallback — Any provider with an api base URL can work via this universal adapter'
  - 'No dynamic npm install — Only use pre-bundled AI SDK packages (simpler, Deno-compatible)'

