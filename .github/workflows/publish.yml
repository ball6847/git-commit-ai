name: Publish to JSR

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+' # Matches semantic version tags like v1.0.0, v2.1.3

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for trusted publishing with JSR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: v2.x

      - name: Check formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint

      - name: Type check
        run: deno check src/cli.ts

      - name: Run tests
        run: deno test --allow-run --allow-env --allow-read

      - name: Dry run publish
        run: deno publish --dry-run

      - name: Publish to JSR
        run: deno publish
        # Uses trusted publishing - no JSR_TOKEN secret needed!
        # The JSR registry trusts GitHub's OIDC token
